<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Test Effort Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        @media print { .no-print { display: none !important; } body { background: white; } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .sticky-header { position: sticky; top: 0; z-index: 50; padding: 1.5rem 0; margin-top: -1.5rem; }

        /* Smooth sequential color wave text animation styles */
        @keyframes colorWave {
            0%, 100% { color: #face5c; transform: translateY(0); }
            50% { color: #38bdf8; transform: translateY(-4px); }
        }
        .wave-char {
            display: inline-block;
            animation: colorWave 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans" x-data="labEstimator()" x-init="initFirebase()">

    <div x-show="!authenticated" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900" x-transition>
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl mx-4">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-blue-50 text-blue-600 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Lab Estimator Secure Lock</h2>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mt-1">Authorized Operations Personnel Only</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-1.5 inline-block">Username</label>
                    <input type="text" x-model="loginUser" @keyup.enter="handleGlobalAccessLogin()" placeholder="Enter identity..." class="w-full px-5 py-3.5 bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white rounded-2xl outline-none font-bold text-sm transition-all text-slate-700">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-1.5 inline-block">Security Password</label>
                    <input type="password" x-model="loginPass" @keyup.enter="handleGlobalAccessLogin()" placeholder="••••••••" class="w-full px-5 py-3.5 bg-slate-50 border-2 border-slate-100 focus:border-blue-500 focus:bg-white rounded-2xl outline-none font-bold text-sm transition-all text-slate-700">
                </div>
                
                <template x-if="accessError">
                    <p class="text-xs text-red-500 font-bold bg-red-50 p-3 rounded-xl border border-red-100 text-center" x-text="accessError"></p>
                </template>

                <button @click="handleGlobalAccessLogin()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-colors mt-2 text-sm uppercase tracking-wider">
                    Sign In
                </button>
            </div>
        </div>
    </div>

    <div x-show="authenticated" x-cloak class="flex flex-col min-h-screen">
        
        <header class="bg-[#4a3728] border-b border-[#36271c] px-6 py-4 flex items-center justify-center text-center shadow-lg relative z-30">
            <div class="flex items-center justify-center gap-3">
                <span class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_12px_#ef4444] animate-pulse"></span>
                <h1 class="text-base font-black drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] tracking-[0.15em] uppercase select-none">
                    <span class="wave-char" style="animation-delay: 0.05s">:</span>
                    <span class="wave-char" style="animation-delay: 0.10s">T</span>
                    <span class="wave-char" style="animation-delay: 0.15s">E</span>
                    <span class="wave-char" style="animation-delay: 0.20s">A</span>
                    <span class="wave-char" style="animation-delay: 0.25s">-</span>
                    <span class="wave-char" style="animation-delay: 0.30s">M</span>
                    <span class="wave-char" style="animation-delay: 0.35s">&nbsp;</span>
                    <span class="wave-char" style="animation-delay: 0.40s">:</span>
                    <span class="wave-char" style="animation-delay: 0.45s">&nbsp;</span>
                    <span class="wave-char" style="animation-delay: 0.50s">T</span>
                    <span class="wave-char" style="animation-delay: 0.55s">e</span>
                    <span class="wave-char" style="animation-delay: 0.60s">s</span>
                    <span class="wave-char" style="animation-delay: 0.65s">t</span>
                    <span class="wave-char" style="animation-delay: 0.70s">s</span>
                    <span class="wave-char" style="animation-delay: 0.75s">&nbsp;</span>
                    <span class="wave-char" style="animation-delay: 0.80s">E</span>
                    <span class="wave-char" style="animation-delay: 0.85s">s</span>
                    <span class="wave-char" style="animation-delay: 0.90s">t</span>
                    <span class="wave-char" style="animation-delay: 0.95s">i</span>
                    <span class="wave-char" style="animation-delay: 1.00s">m</span>
                    <span class="wave-char" style="animation-delay: 1.05s">a</span>
                    <span class="wave-char" style="animation-delay: 1.10s">t</span>
                    <span class="wave-char" style="animation-delay: 1.15s">i</span>
                    <span class="wave-char" style="animation-delay: 1.20s">o</span>
                    <span class="wave-char" style="animation-delay: 1.25s">n</span>
                    <span class="wave-char" style="animation-delay: 1.30s">&nbsp;</span>
                    <span class="wave-char" style="animation-delay: 1.35s">A</span>
                    <span class="wave-char" style="animation-delay: 1.40s">p</span>
                    <span class="wave-char" style="animation-delay: 1.45s">p</span>
                    <span class="wave-char" style="animation-delay: 1.50s">l</span>
                    <span class="wave-char" style="animation-delay: 1.55s">i</span>
                    <span class="wave-char" style="animation-delay: 1.60s">c</span>
                    <span class="wave-char" style="animation-delay: 1.65s">a</span>
                    <span class="wave-char" style="animation-delay: 1.70s">t</span>
                    <span class="wave-char" style="animation-delay: 1.75s">i</span>
                    <span class="wave-char" style="animation-delay: 1.80s">o</span>
                    <span class="wave-char" style="animation-delay: 1.85s">n</span>
                    <span class="wave-char" style="animation-delay: 1.90s">&nbsp;</span>
                    <span class="wave-char" style="animation-delay: 1.95s">-</span>
                    <span class="wave-char" style="animation-delay: 2.00s">&nbsp;</span>
                    <span class="wave-char" style="animation-delay: 2.05s">M</span>
                    <span class="wave-char" style="animation-delay: 2.10s">C</span>
                    <span class="wave-char" style="animation-delay: 2.15s">C</span>
                </h1>
                <span class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_12px_#ef4444] animate-pulse"></span>
            </div>
        </header>

        <div class="flex flex-1 pt-0">
            <aside class="w-72 bg-white border-r border-slate-200 p-6 hidden lg:flex flex-col no-print fixed h-[calc(100vh-57px)] overflow-y-auto custom-scroll top-[57px]">
                <div class="mb-8 flex flex-col gap-2">
                    <button @click="isAdmin ? logout() : showLoginModal = true" 
                            class="w-full py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all shadow-sm"
                            :class="isAdmin ? 'bg-red-100 text-red-600 border border-red-200' : 'bg-slate-100 text-slate-500 hover:bg-blue-50 hover:text-blue-600'">
                        <span x-text="isAdmin ? 'Lock Admin Mode' : 'Admin Mode'"></span>
                    </button>
                    <button @click="logoutGlobalAccess()" class="w-full py-2 bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-white rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                        Exit Platform
                    </button>
                </div>
                
                <template x-if="currentView === 'estimator'">
                    <div>
                        <h2 class="text-xs uppercase tracking-widest font-black text-slate-400 mb-4">Test Categories</h2>
                        <div class="space-y-1 mb-10">
                            <template x-for="group in groupedTests" :key="group.title">
                                <button @click="scrollToGroup(group.title)" 
                                        class="w-full text-left px-4 py-2 rounded-lg font-bold text-sm transition-all text-slate-600 hover:bg-blue-50 hover:text-blue-600" 
                                        x-text="group.title"></button>
                            </template>
                        </div>
                    </div>
                </template>

                <div class="mb-6">
                    <button @click="currentView = (currentView === 'estimator' ? 'summary' : 'estimator')" 
                            class="w-full py-3 px-4 rounded-xl text-xs font-black uppercase tracking-wider transition-all flex items-center justify-center gap-2 shadow-sm"
                            :class="currentView === 'summary' ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-slate-900 text-white hover:bg-slate-800'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <span x-text="currentView === 'estimator' ? 'View Projects Summary' : 'Back to Calculator'"></span>
                    </button>
                </div>
                
                <h2 class="text-xs uppercase tracking-widest font-black text-slate-400 mb-4">Projects List</h2>
                <div class="space-y-3">
                    <template x-for="(item, index) in history" :key="index">
                        <div class="flex items-center gap-2 group">
                            <div class="flex-1 p-3 bg-slate-50 rounded-xl border border-transparent hover:border-blue-300 cursor-pointer transition-all" 
                                 :class="selectedProjectId === item.id ? 'border-blue-500 bg-blue-50/30' : ''"
                                 @click="currentView = 'estimator'; loadEstimate(index)">
                                <p class="text-[9px] font-black text-blue-500 uppercase flex justify-between items-center">
                                    <span x-text="item.timestamp"></span>
                                    <span x-show="selectedProjectId === item.id" class="text-[8px] bg-blue-600 text-white px-1.5 py-0.5 rounded-full lowercase font-normal">editing</span>
                                </p>
                                <p class="font-bold text-slate-700 text-sm truncate" x-text="item.name"></p>
                            </div>
                            <button @click.stop="deleteHistoryItem(index)" class="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </template>
                </div>
            </aside>

            <div x-show="showLoginModal" x-cloak x-transition class="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm no-print">
                <div @click.away="showLoginModal = false" class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl text-center">
                    <h3 class="text-xl font-black text-slate-800 mb-6">Admin Access</h3>
                    <input type="password" x-model="password" @keyup.enter="login()" placeholder="Password" class="w-full px-5 py-3 bg-slate-100 border-2 border-transparent focus:border-blue-500 rounded-xl outline-none font-bold text-center mb-4">
                    <button @click="login()" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-colors">Unlock Admin</button>
                </div>
            </div>

            <div class="flex-1 lg:ml-72 min-w-0">
                
                <main x-show="currentView === 'estimator'" class="p-6 md:p-12 lg:mr-80">
                    <div class="sticky-header bg-slate-50/90 backdrop-blur-md no-print">
                        <div class="bg-[#0f172a] rounded-[2.5rem] p-8 flex items-center justify-between shadow-2xl text-white">
                            <div class="flex-1 space-y-1">
                                <p class="text-2xl font-black text-blue-400 tracking-wide uppercase truncate max-w-xl" x-text="projectName"></p>
                                <p class="text-2xl font-black text-white tracking-tight">Grand Total Effort</p>
                            </div>
                            <div class="flex items-center gap-8 border-l border-slate-700 pl-8">
                                <div class="text-center">
                                    <div class="text-3xl font-black text-blue-400" x-text="grandTotal"></div>
                                    <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Total Hrs</p>
                                </div>
                                <div class="text-center">
                                    <div class="text-3xl font-black text-white" x-text="grandTotalDays"></div>
                                    <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Days (6.5h)</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 mb-10 space-y-4">
                        <div>
                            <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-1 inline-block">Project Title</label>
                            <div class="flex flex-col md:flex-row justify-between items-end gap-4">
                                <input type="text" x-model="projectName" class="bg-transparent text-3xl font-black text-slate-800 border-b-2 border-slate-200 focus:border-blue-500 pb-1 w-full outline-none transition-colors">
                                
                                <div class="flex items-center gap-2 no-print">
                                    <button @click="duplicateEntireProject()" 
                                            x-show="selectedProjectId" 
                                            x-cloak
                                            title="Copy this entire project layout as a new workspace instance"
                                            class="px-5 py-3 bg-slate-800 text-slate-200 rounded-2xl font-bold shadow-md hover:bg-slate-700 hover:text-white transition-all flex items-center gap-2 text-sm whitespace-nowrap">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                                        </svg>
                                        Duplicate Project
                                    </button>
                                    <button @click="saveToHistory()" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all whitespace-nowrap" x-text="selectedProjectId ? 'Update Project' : 'Save Project'"></button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 xl:grid-cols-12 gap-4 bg-white border border-slate-200 rounded-[2rem] p-6 shadow-sm">
                            <div class="xl:col-span-5">
                                <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-1.5 inline-block">Project Notes</label>
                                <textarea x-model="projectNotes" placeholder="Enter specific constraints, equipment IDs, or observations..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs font-medium focus:ring-2 focus:ring-blue-500 outline-none h-[88px] resize-none"></textarea>
                            </div>
                            
                            <div class="xl:col-span-5 grid grid-cols-1 sm:grid-cols-3 gap-3">
                                <div>
                                    <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-1.5 inline-block">RFS #</label>
                                    <input type="text" x-model="rfsNumber" placeholder="e.g. RFS-1042" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all h-[44px]">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-1.5 inline-block">Test Design #</label>
                                    <input type="text" x-model="testDesignNumber" placeholder="e.g. TD-9921" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all h-[44px]">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-1.5 inline-block">Test Record #</label>
                                    <input type="text" x-model="testRecordNumber" placeholder="e.g. TR-5540" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all h-[44px]">
                                </div>
                            </div>

                            <div class="xl:col-span-2">
                                <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-1.5 inline-block">Sub_Business</label>
                                <select x-model="subBusiness" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer h-[44px]">
                                    <option value="">Select Option...</option>
                                    <option value="Infant Feeding">Infant Feeding</option>
                                    <option value="Comforting">Comforting</option>
                                    <option value="Breast feeding">Breast feeding</option>
                                    <option value="Healthy feeding">Healthy feeding</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-white border border-slate-200 rounded-[2rem] p-6 shadow-sm">
                            <div>
                                <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-2 inline-block">Test Lead Name</label>
                                <input type="text" x-model="testLeadName" placeholder="Type lead engineer name..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-2 inline-block">Start Date</label>
                                <input type="date" x-model="startDate" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-2 inline-block flex items-center gap-1.5 w-max">
                                    Expected End Date 
                                </label>
                                <div class="w-full bg-slate-100 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-black text-blue-600 h-[46px] flex items-center" x-text="expectedEndDate"></div>
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-purple-700 bg-slate-100 px-2 py-0.5 rounded mb-2 inline-block">Project Status</label>
                                <select x-model="projectStatus" 
                                        class="w-full border-0 rounded-xl px-4 py-2.5 text-sm font-black outline-none transition-all cursor-pointer shadow-sm"
                                        :class="{
                                            'bg-yellow-400 text-yellow-950': projectStatus === 'Not Started',
                                            'bg-orange-500 text-white': projectStatus === 'In-Progress',
                                            'bg-green-600 text-white': projectStatus === 'Completed',
                                            'bg-red-600 text-white': projectStatus === 'On Hold',
                                            'bg-purple-600 text-white': projectStatus === 'Shipment not recd'
                                        }">
                                    <option class="bg-white text-slate-900 font-medium" value="Not Started">Not Started</option>
                                    <option class="bg-white text-slate-900 font-medium" value="In-Progress">In-Progress</option>
                                    <option class="bg-white text-slate-900 font-medium" value="On Hold">On Hold</option>
                                    <option class="bg-white text-slate-900 font-medium" value="Shipment not recd">Shipment not recd</option>
                                    <option class="bg-white text-slate-900 font-medium" value="Completed">Completed</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-12 pb-32">
                        <template x-for="group in groupedTests" :key="group.title">
                            <div :id="group.title" class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                                <div class="px-8 py-6 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
                                    <h3 class="text-xl font-black text-slate-800" x-text="group.title"></h3>
                                    
                                    <div x-show="isAdmin" x-cloak class="no-print flex items-center gap-2 bg-white border border-slate-200 p-2 rounded-xl shadow-sm max-w-md">
                                        <input type="text" placeholder="Test Label" class="px-2 py-1 bg-slate-50 rounded text-xs font-bold w-32 outline-none border border-transparent focus:border-blue-500" x-model="group.newLabel">
                                        <input type="text" placeholder="Sub-label" class="px-2 py-1 bg-slate-50 rounded text-xs font-medium w-24 outline-none border border-transparent focus:border-blue-500" x-model="group.newSubLabel">
                                        <input type="number" step="0.1" placeholder="Hrs" class="px-1 py-1 bg-slate-50 rounded text-xs font-black text-center w-12 outline-none border border-transparent focus:border-blue-500" x-model.number="group.newWeight">
                                        <label class="flex items-center gap-1 text-[10px] font-bold text-slate-500 cursor-pointer select-none">
                                            <input type="checkbox" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500" x-model="group.newHasOrientations"> Orient
                                        </label>
                                        <button @click="addNewTestItem(group)" class="p-1 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd"/></svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left min-w-[850px]">
                                        <thead class="bg-slate-50/30 text-[10px] uppercase font-black text-slate-400 border-b">
                                            <tr>
                                                <th class="px-8 py-4 w-1/4">Test Name</th>
                                                <th class="px-4 py-4 w-1/5">Tester</th>
                                                <th class="px-4 py-4 text-center">Multipliers & Calibration</th>
                                                <th class="px-4 py-4 text-center w-32">Parallel?</th>
                                                <th class="px-4 py-4 text-center w-36">Test Status</th>
                                                <th class="px-4 py-4 text-right w-20">Qty</th>
                                                <th class="px-6 py-4 text-center w-36 no-print">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-50">
                                            <template x-for="(test, index) in group.items" :key="test.id">
                                                <tr class="transition-colors" :class="test.count > 0 ? 'bg-green-50/40' : 'hover:bg-slate-50/30'">
                                                    <td class="px-8 py-5">
                                                        <template x-if="test.isCustom || test.isDuplicated">
                                                            <input type="text" x-model="test.label" class="bg-white border border-slate-200 rounded-lg px-2.5 py-1 text-xs font-black text-slate-800 outline-none focus:border-blue-500 w-full shadow-sm" @input="updateLiveSummaryFromGrid()">
                                                        </template>
                                                        <template x-if="!test.isCustom && !test.isDuplicated">
                                                            <div :class="test.count > 0 ? 'text-green-700 font-black' : 'text-slate-700 font-bold'" x-text="test.label"></div>
                                                        </template>
                                                        <div class="text-[9px] uppercase font-bold text-slate-400 mt-0.5" x-text="test.subLabel"></div>
                                                    </td>
                                                    <td class="px-4 py-5 align-middle">
                                                        <input type="text" x-model="test.testerName" placeholder="Assign tester..." class="w-full bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-bold text-slate-700 outline-none focus:border-blue-500 transition-colors" @input="updateLiveSummaryFromGrid()">
                                                    </td>
                                                    <td class="px-4 py-5 align-middle text-center">
                                                        <template x-if="test.id.includes('scale')">
                                                            <div class="flex gap-3 justify-center items-center">
                                                                <div class="text-center"><p class="text-[9px] font-black text-purple-700 bg-slate-100 px-1.5 py-0.5 rounded uppercase mb-1">US Oz</p><input type="number" class="w-14 p-2 border border-slate-200 rounded-xl text-center text-sm font-bold" x-model.number="test.usOz" @input="updateLiveSummaryFromGrid()"></div>
                                                                <div class="text-center"><p class="text-[9px] font-black text-purple-700 bg-slate-100 px-1.5 py-0.5 rounded mb-1">ml</p><input type="number" class="w-14 p-2 border border-slate-200 rounded-xl text-center text-sm font-bold" x-model.number="test.ml" @input="updateLiveSummaryFromGrid()"></div>
                                                                <div class="text-center"><p class="text-[9px] font-black text-purple-700 bg-slate-100 px-1.5 py-0.5 rounded uppercase mb-1">UK Oz</p><input type="number" class="w-14 p-2 border border-slate-200 rounded-xl text-center text-sm font-bold" x-model.number="test.ukOz" @input="updateLiveSummaryFromGrid()"></div>
                                                                <div class="text-center ml-2 pl-4 border-l-2 border-slate-100"><p class="text-[9px] font-black text-blue-500 uppercase mb-1">Meas.</p><div class="text-lg font-black text-slate-700" x-text="calculateScaleMeasurements(test)"></div><p class="text-[8px] font-bold text-slate-400 mt-1">@ 0.05h</p></div>
                                                            </div>
                                                        </template>
                                                        <template x-if="!test.id.includes('scale')">
                                                            <div class="flex gap-4 justify-center items-end">
                                                                <div class="text-center"><p class="text-[8px] font-black text-purple-700 bg-slate-100 px-1.5 py-0.5 rounded uppercase mb-1">Base (h)</p><input type="number" step="0.1" class="w-16 p-2 border border-slate-200 rounded-lg text-center font-black text-blue-600" :disabled="!isAdmin && !test.isCustom && !test.isDuplicated" x-model.number="test.weight" @input="updateLiveSummaryFromGrid()"></div>
                                                                <template x-if="test.hasOrientations"><div class="text-center"><p class="text-[8px] font-black text-purple-700 bg-slate-100 px-1.5 py-0.5 rounded uppercase mb-1">Orient.</p><input type="number" class="w-16 p-2 border border-slate-200 rounded-lg text-center font-black text-blue-600" x-model.number="test.orientations" @input="updateLiveSummaryFromGrid()"></div></template>
                                                            </div>
                                                        </template>
                                                    </td>
                                                    <td class="px-4 py-5 align-middle text-center">
                                                        <label class="inline-flex items-center justify-center cursor-pointer select-none">
                                                            <input type="checkbox" x-model="test.isParallel" @change="syncParallelState(test.id, test.isParallel)" class="rounded-md border-slate-300 text-orange-500 focus:ring-orange-500 w-4 h-4">
                                                            <span class="text-[10px] font-bold text-slate-500 ml-1.5 uppercase">Yes</span>
                                                        </label>
                                                    </td>
                                                    <td class="px-4 py-5 align-middle text-center">
                                                        <select x-model="test.status" @change="updateLiveSummaryFromGrid()" class="border-0 rounded-lg px-2 py-1.5 text-xs font-black outline-none transition-all cursor-pointer shadow-sm w-36" :class="{ 'bg-yellow-400 text-yellow-950': test.status === 'Not Started' || !test.status, 'bg-orange-500 text-white': test.status === 'In-Progress', 'bg-green-600 text-white': test.status === 'Completed', 'bg-red-600 text-white': test.status === 'On Hold' }">
                                                            <option class="bg-white text-slate-900 font-medium" value="Not Started">Not Started</option>
                                                            <option class="bg-white text-slate-900 font-medium" value="In-Progress">In-Progress</option>
                                                            <option class="bg-white text-slate-900 font-medium" value="On Hold">On Hold</option>
                                                            <option class="bg-white text-slate-900 font-medium" value="Completed">Completed</option>
                                                        </select>
                                                    </td>
                                                    <td class="px-4 py-5 text-right"><input type="number" min="0" class="w-16 p-2 rounded-xl text-right font-black bg-slate-100 outline-none focus:ring-2 focus:ring-blue-500" x-model.number="test.count" @input="updateLiveSummaryFromGrid()"></td>
                                                    <td class="px-6 py-5 align-middle text-center no-print">
                                                        <div class="flex items-center justify-center gap-1.5">
                                                            <div class="flex flex-col gap-0.5 mr-1">
                                                                <button @click="moveRow(group, index, -1)" :disabled="index === 0" title="Move Up" class="p-1 bg-slate-100 hover:bg-slate-200 disabled:opacity-30 disabled:hover:bg-slate-100 rounded text-slate-600 transition-all">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7" /></svg>
                                                                </button>
                                                                <button @click="moveRow(group, index, 1)" :disabled="index === group.items.length - 1" title="Move Down" class="p-1 bg-slate-100 hover:bg-slate-200 disabled:opacity-30 disabled:hover:bg-slate-100 rounded text-slate-600 transition-all">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
                                                                </button>
                                                            </div>
                                                            <button @click="duplicateRow(group, test, index)" title="Duplicate Row Instance" class="p-2 bg-slate-100 hover:bg-orange-100 rounded-xl text-slate-500 hover:text-orange-600 transition-colors">
                                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
                                                            </button>
                                                            <button @click="removeTestItem(group, index)" :disabled="!isAdmin && !test.isCustom && !test.isDuplicated" class="p-2 bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 disabled:opacity-30 disabled:hover:bg-slate-100 rounded-xl transition-colors">
                                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </template>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        function labEstimator() {
            return {
                authenticated: false,
                loginUser: '',
                loginPass: '',
                accessError: '',
                isAdmin: false,
                showLoginModal: false,
                password: '',
                currentView: 'estimator',
                projectName: 'New Project',
                projectNotes: '',
                rfsNumber: '',
                testDesignNumber: '',
                testRecordNumber: '',
                subBusiness: '',
                testLeadName: '',
                startDate: new Date().toISOString().split('T')[0],
                projectStatus: 'Not Started',
                selectedProjectId: null,
                history: [],
                groupedTests: [
                    {
                        title: 'General Lab Tasks',
                        newLabel: '', newSubLabel: '', newWeight: 1, newHasOrientations: false,
                        items: [
                            { id: 'gen_prep', label: 'Sample Preparation & Check-in', subLabel: 'Unboxing, logging, verification', weight: 1.5, count: 0, testerName: '', status: 'Not Started', isParallel: false },
                            { id: 'gen_setup', label: 'Equipment Calibration & Alignment', subLabel: 'Pre-test fixture alignment', weight: 1.0, count: 0, testerName: '', status: 'Not Started', isParallel: false }
                        ]
                    },
                    {
                        title: 'Scale & Dimensional Calibration',
                        newLabel: '', newSubLabel: '', newWeight: 0.5, newHasOrientations: false,
                        items: [
                            { id: 'scale_verif', label: 'Volumetric Scale Evaluation', subLabel: 'US Oz, ml, UK Oz configurations', weight: 0.05, count: 0, usOz: 0, ml: 0, ukOz: 0, testerName: '', status: 'Not Started', isParallel: false }
                        ]
                    }
                ],

                initFirebase() {
                    // Firebase stub interface placeholder for data layer configuration
                    this.loadLocalWorkspaceData();
                },

                handleGlobalAccessLogin() {
                    if (this.loginUser.trim() !== '' && this.loginPass === 'MCC2026') {
                        this.authenticated = true;
                        this.accessError = '';
                    } else {
                        this.accessError = 'Invalid identity credentials.';
                    }
                },

                logoutGlobalAccess() {
                    this.authenticated = false;
                    this.loginUser = '';
                    this.loginPass = '';
                },

                login() {
                    if (this.password === 'admin123') {
                        this.isAdmin = true;
                        this.showLoginModal = false;
                        this.password = '';
                    } else {
                        alert('Incorrect administrative key.');
                    }
                },

                logout() {
                    this.isAdmin = false;
                },

                scrollToGroup(id) {
                    const el = document.getElementById(id);
                    if (el) el.scrollIntoView({ behavior: 'smooth' });
                },

                calculateScaleMeasurements(test) {
                    const totalMeas = (parseInt(test.usOz) || 0) + (parseInt(test.ml) || 0) + (parseInt(test.ukOz) || 0);
                    return totalMeas;
                },

                syncParallelState(testId, state) {
                    this.groupedTests.forEach(g => {
                        g.items.forEach(t => {
                            if (t.id === testId) t.isParallel = state;
                        });
                    });
                },

                updateLiveSummaryFromGrid() {
                    // Triggers dynamic data context updates inside Alpine context layers
                },

                addNewTestItem(group) {
                    if (!group.newLabel.trim()) return;
                    group.items.push({
                        id: 'custom_' + Date.now(),
                        label: group.newLabel,
                        subLabel: group.newSubLabel || 'Custom Added Test',
                        weight: parseFloat(group.newWeight) || 1.0,
                        hasOrientations: group.newHasOrientations,
                        orientations: group.newHasOrientations ? 1 : 0,
                        count: 0,
                        testerName: '',
                        status: 'Not Started',
                        isParallel: false,
                        isCustom: true
                    });
                    group.newLabel = ''; group.newSubLabel = ''; group.newWeight = 1; group.newHasOrientations = false;
                },

                duplicateRow(group, test, index) {
                    const copy = JSON.parse(JSON.stringify(test));
                    copy.id = test.id.split('_copy')[0] + '_copy_' + Date.now();
                    copy.isDuplicated = true;
                    copy.count = 0;
                    group.items.splice(index + 1, 0, copy);
                },

                removeTestItem(group, index) {
                    group.items.splice(index, 1);
                },

                moveRow(group, index, direction) {
                    const targetIndex = index + direction;
                    if (targetIndex < 0 || targetIndex >= group.items.length) return;
                    const temp = group.items[index];
                    group.items[index] = group.items[targetIndex];
                    group.items[targetIndex] = temp;
                },

                duplicateEntireProject() {
                    this.selectedProjectId = null;
                    this.projectName = this.projectName + " (Copy)";
                    alert("Project workspace structure duplicated to a new instance.");
                },

                saveToHistory() {
                    const recordId = this.selectedProjectId || 'proj_' + Date.now();
                    const record = {
                        id: recordId,
                        name: this.projectName,
                        notes: this.projectNotes,
                        rfsNumber: this.rfsNumber,
                        testDesignNumber: this.testDesignNumber,
                        testRecordNumber: this.testRecordNumber,
                        subBusiness: this.subBusiness,
                        testLeadName: this.testLeadName,
                        startDate: this.startDate,
                        projectStatus: this.projectStatus,
                        timestamp: new Date().toLocaleString(),
                        gridData: JSON.parse(JSON.stringify(this.groupedTests))
                    };

                    if (this.selectedProjectId) {
                        const idx = this.history.findIndex(h => h.id === recordId);
                        if (idx !== -1) this.history[idx] = record;
                    } else {
                        this.history.push(record);
                        this.selectedProjectId = recordId;
                    }
                    localStorage.setItem('lab_history', JSON.stringify(this.history));
                },

                loadLocalWorkspaceData() {
                    const stored = localStorage.getItem('lab_history');
                    if (stored) this.history = JSON.parse(stored);
                },

                loadEstimate(index) {
                    const record = this.history[index];
                    this.selectedProjectId = record.id;
                    this.projectName = record.name;
                    this.projectNotes = record.notes || '';
                    this.rfsNumber = record.rfsNumber || '';
                    this.testDesignNumber = record.testDesignNumber || '';
                    this.testRecordNumber = record.testRecordNumber || '';
                    this.subBusiness = record.subBusiness || '';
                    this.testLeadName = record.testLeadName || '';
                    this.startDate = record.startDate || '';
                    this.projectStatus = record.projectStatus || 'Not Started';
                    this.groupedTests = JSON.parse(JSON.stringify(record.gridData));
                },

                deleteHistoryItem(index) {
                    if(confirm("Delete this workspace record permanently?")) {
                        if (this.history[index].id === this.selectedProjectId) {
                            this.selectedProjectId = null;
                        }
                        this.history.splice(index, 1);
                        localStorage.setItem('lab_history', JSON.stringify(this.history));
                    }
                },

                get grandTotal() {
                    let total = 0;
                    this.groupedTests.forEach(g => {
                        g.items.forEach(t => {
                            if (t.count > 0) {
                                let itemEffort = 0;
                                if (t.id.includes('scale')) {
                                    itemEffort = this.calculateScaleMeasurements(t) * 0.05;
                                } else {
                                    const base = t.weight || 0;
                                    const orient = t.orientations ? parseInt(t.orientations) || 1 : 1;
                                    itemEffort = base * orient;
                                }
                                if (t.isParallel) {
                                    total += itemEffort; 
                                } else {
                                    total += (itemEffort * t.count);
                                }
                            }
                        });
                    });
                    return parseFloat(total.toFixed(2));
                },

                get grandTotalDays() {
                    return (this.grandTotal / 6.5).toFixed(1);
                },

                get expectedEndDate() {
                    if (!this.startDate) return '—';
                    const workingDaysRequired = Math.ceil(parseFloat(this.grandTotalDays) || 0);
                    if (workingDaysRequired <= 0) return this.startDate;
                    
                    let current = new Date(this.startDate);
                    let addedDays = 0;
                    while (addedDays < workingDaysRequired) {
                        current.setDate(current.getDate() + 1);
                        const day = current.getDay();
                        if (day !== 0 && day !== 6) { 
                            addedDays++;
                        }
                    }
                    return current.toISOString().split('T')[0];
                }
            }
        }
    </script>
</body>
</html>
