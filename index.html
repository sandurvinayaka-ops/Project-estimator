<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Test Effort Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans" x-data="labEstimator()">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 text-white p-6 overflow-y-auto custom-scroll">
            <h1 class="text-lg font-black mb-8 text-blue-400">Lab Estimator</h1>
            <h2 class="text-[10px] uppercase font-bold text-slate-500 mb-4">Categories</h2>
            <div class="space-y-2">
                <template x-for="group in groupedTests" :key="group.title">
                    <button @click="document.getElementById(group.title).scrollIntoView({behavior:'smooth'})" 
                            class="w-full text-left px-3 py-2 rounded text-sm font-medium hover:bg-slate-800" 
                            x-text="group.title"></button>
                </template>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 custom-scroll">
            <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-200 mb-8">
                <h2 class="text-3xl font-black text-slate-900">Grand Total Effort</h2>
                <input type="text" x-model="projectName" class="text-blue-600 font-bold uppercase tracking-widest text-xs mt-2 w-full outline-none">
                <div class="flex gap-12 mt-6">
                    <div>
                        <div class="text-4xl font-black text-slate-900" x-text="grandTotal"></div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase">Total Hours</div>
                    </div>
                    <div>
                        <div class="text-4xl font-black text-slate-900" x-text="(grandTotal / 6.5).toFixed(1)"></div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase">Days (6.5h)</div>
                    </div>
                </div>
                <div class="mt-6 flex gap-3">
                    <button @click="saveToHistory()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-blue-700">Save Project</button>
                    <button @click="resetAll()" class="bg-slate-200 px-6 py-2 rounded-xl font-bold text-sm hover:bg-slate-300">New Project</button>
                </div>
            </div>

            <div class="space-y-6">
                <template x-for="group in groupedTests" :key="group.title">
                    <div :id="group.title" class="bg-white p-6 rounded-3xl border border-slate-200">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-lg" x-text="group.title"></h3>
                            <button @click="addNewTest(group)" class="text-[10px] font-bold bg-slate-100 px-3 py-1 rounded">ADD TEST</button>
                        </div>
                        <div class="space-y-2">
                            <template x-for="test in group.items" :key="test.id">
                                <div class="grid grid-cols-12 gap-4 items-center bg-slate-50 p-3 rounded-xl">
                                    <div class="col-span-6 font-bold text-sm" x-text="test.label"></div>
                                    <div class="col-span-3 text-center">
                                        <input type="number" x-model.number="test.ml" placeholder="ml" class="w-16 p-1 rounded border text-center text-xs" x-show="test.id.includes('scale')">
                                        <span class="text-xs font-bold text-blue-600" x-show="!test.id.includes('scale')" x-text="test.weight + 'h'"></span>
                                    </div>
                                    <input type="number" x-model.number="test.count" class="col-span-3 p-1 rounded border text-right font-bold text-sm">
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <script>
        function labEstimator() {
            return {
                projectName: 'My New Project',
                history: [],
                groupedTests: [
                    { title: 'Functional & Scale Accuracy', items: [
                        { id: 'scale_1', label: 'Scale Accuracy Test', weight: 0.05, count: 0, ml: 0 },
                        { id: 'static_leak', label: 'Static Leakage Test', weight: 2.5, count: 0 }
                    ]},
                    { title: 'Environmental', items: [
                        { id: 'boil', label: 'Boiling Test', weight: 2.0, count: 0 }
                    ]}
                ],
                get grandTotal() {
                    let total = 0;
                    this.groupedTests.forEach(g => g.items.forEach(t => {
                        total += t.id.includes('scale') ? (t.ml * t.count * 0.05) : (t.weight * t.count);
                    }));
                    return (total * 1.15).toFixed(1);
                },
                addNewTest(g) {
                    const l = prompt("Name:");
                    const w = parseFloat(prompt("Hours:"));
                    if(l && !isNaN(w)) g.items.push({ id: Date.now(), label: l, weight: w, count: 0 });
                },
                saveToHistory() {
                    alert("Project saved to memory.");
                },
                resetAll() {
                    this.groupedTests.forEach(g => g.items.forEach(t => t.count = 0));
                }
            }
        }
    </script>
</body>
</html>
