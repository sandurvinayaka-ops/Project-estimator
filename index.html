<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Test Effort Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div x-data="labEstimator()" x-init="initFirebase()">
        <main class="max-w-5xl mx-auto p-6">
            <div class="bg-[#0f172a] text-white p-8 rounded-[2rem] shadow-2xl mb-8">
                <h1 class="text-2xl font-black">Grand Total Effort</h1>
                <p class="text-blue-400 font-bold" x-text="projectName"></p>
                <div class="mt-4 text-3xl font-black text-blue-400" x-text="grandTotal + ' Hrs'"></div>
            </div>

            <button @click="saveToHistory()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold mb-8">Save to Cloud</button>

            <template x-for="group in groupedTests" :key="group.title">
                <div class="bg-white p-6 rounded-2xl border mb-6">
                    <h2 class="font-black text-lg mb-4" x-text="group.title"></h2>
                    <template x-for="test in group.items" :key="test.id">
                        <div class="flex justify-between items-center py-2 border-b">
                            <span x-text="test.label"></span>
                            <input type="number" class="w-16 border rounded p-1" x-model.number="test.count">
                        </div>
                    </template>
                </div>
            </template>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyBFDfxODOboTkyQlyDPpITfV_p57lOIWOQ",
  authDomain: "project-estimate-79ba8.firebaseapp.com",
  projectId: "project-estimate-79ba8",
  storageBucket: "project-estimate-79ba8.firebasestorage.app",
  messagingSenderId: "284338364751",
  appId: "1:284338364751:web:53796fc4cafb8d3736653a",
  measurementId: "G-193P6KTT9D"
        };

        function labEstimator() {
            return {
                db: null,
                projectName: 'New Project',
                groupedTests: [
                    { title: 'Functional & Scale Accuracy', items: [{ id: '1', label: 'Scale Accuracy Test', weight: 0.05, count: 0 }] }
                ],
                initFirebase() {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    this.db = firebase.firestore();
                },
                async saveToHistory() {
                    try {
                        await this.db.collection('projects').add({
                            name: this.projectName,
                            data: JSON.parse(JSON.stringify(this.groupedTests)),
                            timestamp: new Date()
                        });
                        alert("Saved to Cloud!");
                    } catch (e) {
                        console.error(e);
                        alert("Error: " + e.message);
                    }
                },
                get grandTotal() {
                    let total = 0;
                    this.groupedTests.forEach(g => g.items.forEach(t => total += (t.count * t.weight)));
                    return (total * 1.15).toFixed(1);
                }
            }
        }
    </script>
</body>
</html>
