<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Test Effort Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        @media print { .no-print { display: none !important; } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans" x-data="labEstimator()">

    <div class="flex min-h-screen">
        <aside class="w-72 bg-white border-r border-slate-200 p-6 hidden lg:flex flex-col fixed h-full overflow-y-auto custom-scroll">
            <h2 class="text-xs uppercase tracking-widest font-black text-slate-400 mb-4">Test Categories</h2>
            <div class="space-y-1 mb-10">
                <template x-for="group in groupedTests" :key="group.title">
                    <button @click="document.getElementById(group.title).scrollIntoView({behavior:'smooth'})" 
                            class="w-full text-left px-4 py-2 rounded-lg font-bold text-sm text-slate-600 hover:bg-blue-50 hover:text-blue-600" 
                            x-text="group.title"></button>
                </template>
            </div>
            
            <h2 class="text-xs uppercase tracking-widest font-black text-slate-400 mb-4">Projects List</h2>
            <div class="space-y-3">
                <template x-for="(item, index) in history" :key="index">
                    <div class="p-3 bg-slate-50 rounded-xl cursor-pointer hover:border-blue-300 border border-transparent" @click="loadEstimate(index)">
                        <p class="text-[9px] font-black text-blue-500 uppercase" x-text="item.timestamp"></p>
                        <p class="font-bold text-slate-700 text-sm truncate" x-text="item.name"></p>
                    </div>
                </template>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 lg:ml-72">
            <div class="bg-[#0f172a] rounded-[2rem] p-8 text-white shadow-2xl mb-8">
                <p class="text-2xl font-black">Grand Total Effort</p>
                <p class="text-blue-400 font-bold uppercase tracking-widest text-xs mt-1" x-text="projectName"></p>
                <div class="flex gap-8 mt-6 border-t border-slate-700 pt-6">
                    <div><div class="text-3xl font-black text-blue-400" x-text="grandTotal"></div><div class="text-[10px] uppercase font-bold text-slate-400">Total Hrs</div></div>
                    <div><div class="text-3xl font-black" x-text="(grandTotal / 6.5).toFixed(1)"></div><div class="text-[10px] uppercase font-bold text-slate-400">Days (6.5h)</div></div>
                </div>
            </div>

            <div class="mb-8 flex gap-4">
                <input type="text" x-model="projectName" class="flex-1 bg-white border border-slate-200 rounded-2xl px-4 py-3 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                <button @click="saveToHistory()" class="bg-blue-600 text-white px-6 rounded-2xl font-black hover:bg-blue-700">Save Project</button>
                <button @click="resetAll()" class="bg-red-100 text-red-600 px-6 rounded-2xl font-black hover:bg-red-200">New Project</button>
            </div>

            <div class="space-y-8">
                <template x-for="group in groupedTests" :key="group.title">
                    <div :id="group.title" class="bg-white rounded-[2rem] border border-slate-200 p-8 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-black text-slate-800" x-text="group.title"></h3>
                            <button @click="addNewTest(group)" class="text-[10px] font-black bg-blue-50 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-100 uppercase tracking-widest">Add New Test</button>
                        </div>
                        <div class="space-y-2">
                            <template x-for="test in group.items" :key="test.id">
                                <div class="grid grid-cols-12 items-center gap-4 border-b pb-4">
                                    <div class="col-span-6 font-bold text-sm" x-text="test.label"></div>
                                    <div class="col-span-3 text-center">
                                        <template x-if="test.id.includes('scale')">
                                            <div class="flex gap-1 justify-center">
                                                <input type="number" placeholder="ml" x-model.number="test.ml" class="w-12 p-1 bg-slate-100 rounded text-center text-[10px] font-bold">
                                            </div>
                                        </template>
                                        <template x-if="!test.id.includes('scale')">
                                            <span class="text-blue-600 font-black text-xs" x-text="test.weight + 'h'"></span>
                                        </template>
                                    </div>
                                    <input type="number" x-model.number="test.count" class="col-span-3 p-2 bg-slate-100 rounded-lg text-right font-black outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>

    <script>
        function labEstimator() {
            return {
                projectName: 'New Project',
                history: JSON.parse(localStorage.getItem('lab_history_v10') || '[]'),
                groupedTests: [
                    { title: 'Functional & Scale Accuracy', items: [
                        { id: 'scale_1', label: 'Scale Accuracy Test', weight: 0.05, count: 0, ml: 0 },
                        { id: 'static_leak', label: 'Static Leakage Test', weight: 2.5, count: 0 }
                    ]},
                    { title: 'Environmental Conditioning', items: [
                        { id: 'boil', label: 'Boiling Test', weight: 2.0, count: 0 }
                    ]}
                ],
                get grandTotal() {
                    let total = 0;
                    this.groupedTests.forEach(g => g.items.forEach(t => {
                        if(t.id.includes('scale')) total += (t.ml * t.count * 0.05);
                        else total += (t.weight * t.count);
                    }));
                    return (total * 1.15).toFixed(1);
                },
                addNewTest(group) {
                    const name = prompt("Test Name:");
                    const weight = parseFloat(prompt("Base Hours:"));
                    if(name && !isNaN(weight)) group.items.push({ id: Date.now(), label: name, weight: weight, count: 0 });
                },
                saveToHistory() {
                    const entry = { name: this.projectName, timestamp: new Date().toLocaleString(), data: JSON.parse(JSON.stringify(this.groupedTests)) };
                    this.history.unshift(entry);
                    localStorage.setItem('lab_history_v10', JSON.stringify(this.history));
                },
                loadEstimate(idx) {
                    const item = this.history[idx];
                    this.projectName = item.name;
                    this.groupedTests = item.data;
                },
                resetAll() {
                    if(confirm("Start a new project?")) {
                        this.groupedTests.forEach(g => g.items.forEach(t => t.count = 0));
                        this.projectName = "New Project";
                    }
                }
            }
        }
    </script>
</body>
</html>
